<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор конвертации инвестиций</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-slate-900 p-8 text-white">
            <h1 class="text-2xl font-bold">Калькулятор конвертации займа</h1>
            <p class="text-slate-400 mt-2">Расчет долей в уставном капитале по формуле Revenue-based conversion</p>
        </div>

        <div class="p-8 grid md:grid-cols-2 gap-8">
            <!-- Ввод данных -->
            <div class="space-y-4">
                <h2 class="font-semibold text-lg border-b pb-2">Параметры сделки</h2>
                <div>
                    <label class="block text-sm font-medium">Выручка (млн руб.)</label>
                    <input type="number" id="revenue" value="100" class="w-full border rounded-lg p-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Сумма займа (млн руб.)</label>
                    <input type="number" id="loan" value="10" class="w-full border rounded-lg p-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Уставный капитал (руб.)</label>
                    <input type="number" id="uk" value="10000" class="w-full border rounded-lg p-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Мультипликатор</label>
                    <input type="number" id="mult" value="4" class="w-full border rounded-lg p-2 mt-1">
                </div>
                <button onclick="calculate()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Рассчитать</button>
            </div>

            <!-- Результаты -->
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                <h2 class="font-semibold text-lg mb-4">Результаты</h2>
                <div id="results" class="space-y-3 text-sm">
                    <p>Введите параметры и нажмите "Рассчитать"</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const revenue = parseFloat(document.getElementById('revenue').value) * 1000000;
            const loan = parseFloat(document.getElementById('loan').value) * 1000000;
            const uk = parseFloat(document.getElementById('uk').value);
            const mult = parseFloat(document.getElementById('mult').value);
            const discount = 0.5; // 50% скидка

            // Формула: Доля = (Займ * Мультипликатор) / (Выручка * (1 - Скидка))
            // Для упрощения расчетов используем логику из примера
            const denominator = revenue * (1 - discount);
            const numerator = loan * mult;
            
            // Доля в виде десятичной дроби
            const share = numerator / denominator;
            
            // Номинальная стоимость доли
            const nominal = uk / (1 - share) * share;
            const newUk = uk + nominal;

            document.getElementById('results').innerHTML = `
                <div class="p-4 bg-white rounded-lg shadow-sm border">
                    <p>Доля инвестора: <strong>${(share * 100).toFixed(2)}%</strong></p>
                    <p>Дробь: <strong>1/${(1/share).toFixed(0)}</strong></p>
                </div>
                <div class="p-4 bg-white rounded-lg shadow-sm border">
                    <p>Номинал доли: <strong>${nominal.toLocaleString('ru-RU')} руб.</strong></p>
                    <p>Новый Уставный Капитал: <strong>${newUk.toLocaleString('ru-RU')} руб.</strong></p>
                </div>
                <div class="text-xs text-slate-500 mt-4 italic">
                    *Расчет произведен без учета штрафных коэффициентов.
                </div>
            `;
        }
    </script>
</body>
</html>
